<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>在线点餐</title>
    <style>
      :root {
        --bg: #f2f4f7;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #14b86a;
        --primary-dark: #0f9d59;
        --line: #e5e7eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 18px 14px 120px;
      }

      .hero {
        background: linear-gradient(130deg, #19253c, #2a3f66);
        border-radius: 16px;
        color: #fff;
        padding: 20px;
        margin-bottom: 16px;
      }

      .hero h1 {
        margin: 0;
        font-size: 26px;
      }

      .hero p {
        margin: 6px 0 0;
        opacity: 0.85;
      }

      .category {
        margin-bottom: 18px;
      }

      .category h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 10px;
      }

      .item {
        background: var(--card);
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .item .name {
        font-weight: 700;
      }

      .item .desc {
        color: var(--muted);
        font-size: 13px;
        min-height: 32px;
      }

      .item .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .price {
        font-weight: 700;
      }

      .add-btn {
        border: none;
        border-radius: 8px;
        background: var(--primary);
        color: #fff;
        padding: 7px 10px;
        cursor: pointer;
        font-weight: 700;
      }

      .add-btn:hover {
        background: var(--primary-dark);
      }

      .cart {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255, 255, 255, 0.97);
        border-top: 1px solid var(--line);
        box-shadow: 0 -8px 20px rgba(0, 0, 0, 0.06);
        backdrop-filter: blur(4px);
      }

      .cart-inner {
        max-width: 980px;
        margin: 0 auto;
        padding: 10px 14px 14px;
      }

      .cart-list {
        max-height: 140px;
        overflow: auto;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .cart-row {
        display: grid;
        grid-template-columns: 1fr auto auto auto;
        gap: 8px;
        align-items: center;
        font-size: 14px;
        margin-bottom: 6px;
      }

      .qty-btn {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
        width: 28px;
        height: 28px;
      }

      .cart-form {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        margin-top: 10px;
      }

      .cart-form input,
      .cart-form select,
      .cart-form textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        font-size: 14px;
      }

      .cart-form textarea {
        grid-column: 1 / -1;
        min-height: 60px;
      }

      .submit {
        margin-top: 10px;
        width: 100%;
        border: none;
        border-radius: 10px;
        background: #111827;
        color: #fff;
        padding: 12px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }

      .submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      @media (max-width: 640px) {
        .cart-form {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="hero">
        <h1 id="store-name">正在加载...</h1>
        <p>在线点餐，厨房自动打印</p>
      </div>

      <div id="menu-root"></div>
    </div>

    <div class="cart">
      <div class="cart-inner">
        <ul id="cart-list" class="cart-list"></ul>
        <div id="empty-msg" style="color: #6b7280; font-size: 14px">购物车为空</div>
        <div style="margin-top: 6px; font-weight: 700">总价: <span id="total">0</span></div>

        <div class="cart-form">
          <input id="customer-name" placeholder="姓名(可选)" />
          <input id="customer-phone" placeholder="手机号(可选)" />
          <select id="order-type">
            <option value="dine_in">堂食</option>
            <option value="takeaway">自取</option>
            <option value="delivery">外卖</option>
          </select>
          <input id="address" placeholder="地址(外卖填写)" />
          <textarea id="note" placeholder="备注(可选)"></textarea>
        </div>

        <button id="submit-btn" class="submit" type="button">提交订单</button>
      </div>
    </div>

    <script>
      const cart = new Map();
      const productMap = new Map();

      function formatPrice(v) {
        return `${v} RSD`;
      }

      function renderCart() {
        const list = document.getElementById("cart-list");
        const empty = document.getElementById("empty-msg");
        list.innerHTML = "";

        let total = 0;
        for (const [id, qty] of cart.entries()) {
          const p = productMap.get(id);
          if (!p) continue;
          const subtotal = p.price * qty;
          total += subtotal;

          const li = document.createElement("li");
          li.className = "cart-row";
          li.innerHTML = `
            <span>${p.name}</span>
            <button class="qty-btn" data-act="minus" data-id="${id}">-</button>
            <span>x${qty}</span>
            <button class="qty-btn" data-act="plus" data-id="${id}">+</button>
          `;
          list.appendChild(li);
        }

        empty.style.display = cart.size ? "none" : "block";
        document.getElementById("total").textContent = formatPrice(total);
      }

      function renderMenu(data) {
        document.getElementById("store-name").textContent = data.store_name || "点餐";
        const root = document.getElementById("menu-root");
        root.innerHTML = "";

        for (const cat of data.categories || []) {
          const section = document.createElement("section");
          section.className = "category";

          const title = document.createElement("h2");
          title.textContent = cat.name;
          section.appendChild(title);

          const grid = document.createElement("div");
          grid.className = "grid";

          for (const p of cat.products || []) {
            productMap.set(p.id, p);

            const card = document.createElement("div");
            card.className = "item";
            card.innerHTML = `
              <div class="name">${p.name}</div>
              <div class="desc">${p.description || ""}</div>
              <div class="row">
                <span class="price">${formatPrice(p.price)}</span>
                <button class="add-btn" data-add="${p.id}">加入</button>
              </div>
            `;
            grid.appendChild(card);
          }

          section.appendChild(grid);
          root.appendChild(section);
        }
      }

      async function loadMenu() {
        const res = await fetch("/api/menu");
        const data = await res.json();
        renderMenu(data);
      }

      async function submitOrder() {
        if (cart.size === 0) {
          alert("请先选择菜品");
          return;
        }

        const btn = document.getElementById("submit-btn");
        btn.disabled = true;
        btn.textContent = "提交中...";

        const items = [];
        for (const [productId, qty] of cart.entries()) {
          items.push({ product_id: Number(productId), qty });
        }

        const payload = {
          customer_name: document.getElementById("customer-name").value.trim(),
          customer_phone: document.getElementById("customer-phone").value.trim(),
          order_type: document.getElementById("order-type").value,
          address: document.getElementById("address").value.trim(),
          note: document.getElementById("note").value.trim(),
          items,
        };

        try {
          const res = await fetch("/api/order", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok || !data.success) {
            alert(data.error || "下单失败");
            return;
          }

          alert(`下单成功\n订单号: ${data.order_no}`);
          cart.clear();
          renderCart();
          document.getElementById("note").value = "";
        } catch {
          alert("网络错误");
        } finally {
          btn.disabled = false;
          btn.textContent = "提交订单";
        }
      }

      document.body.addEventListener("click", (e) => {
        const add = e.target.getAttribute("data-add");
        if (add) {
          const v = cart.get(add) || 0;
          cart.set(add, v + 1);
          renderCart();
        }

        const act = e.target.getAttribute("data-act");
        const id = e.target.getAttribute("data-id");
        if (!act || !id) return;

        const v = cart.get(id) || 0;
        if (act === "plus") {
          cart.set(id, v + 1);
        } else {
          if (v <= 1) cart.delete(id);
          else cart.set(id, v - 1);
        }
        renderCart();
      });

      document.getElementById("submit-btn").addEventListener("click", submitOrder);

      loadMenu().catch(() => {
        alert("加载菜单失败");
      });
    </script>
  </body>
</html>
